openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: proxy
    description: SOCKS5 proxy operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /proxy/status:
    get:
      operationId: getProxyStatus
      tags: [proxy]
      summary: Get SOCKS5 proxy status
      description: Returns the current status, host, and port of the SOCKS5 proxy server
      responses:
        "200":
          description: Proxy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ProxyStatus:
      type: object
      properties:
        running:
          type: boolean
        host:
          type: string
        port:
          type: integer
        startedAt:
          type: ["string", "null"]
        connections:
          type: integer
      required:
        - running
        - host
        - port
        - startedAt
        - connections
