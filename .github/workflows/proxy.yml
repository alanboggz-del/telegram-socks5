name: Run Telegram Proxy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  push:
    branches:
      - main

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start SOCKS5 Proxy and Tunnel
        run: |
          # Run a clean, standalone SOCKS5 proxy on port 10000 directly
          npx socks5-proxy-server --port 10000 &
          
          # Wait 5 seconds for it to spin up
          sleep 5
          
          # Force a custom TCP tunnel port on Serveo
          ssh -o StrictHostKeyChecking=no -R 54321:localhost:10000 serveo.net
          
