name: Run Telegram Proxy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  push:
    branches:
      - main

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Start SOCKS5 Proxy and Tunnel
        run: |
          # Start the proxy script in the background
          pnpm --filter scripts hello &
          
          # Wait 3 seconds for the proxy to initialize
          sleep 3
          
          # Request a raw TCP tunnel from Serveo
          ssh -o StrictHostKeyChecking=no -R 0:localhost:10000 serveo.net
          
